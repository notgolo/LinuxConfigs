conky.text = [[
#date/time
${font FortuneCity:size=22}${color}${time %A}
${font FortuneCity:size=30}${color}${time %d %B}
${font FortuneCity:size=22}${color}${time %Y}
${font FortuneCity:size=30}${color}${time %H:%M:%S}${font}
${hr 3}
${font FortuneCity:size=22}${execi 1800 curl 'wttr.in/[REDACTED]?format=%C'}${font}
${font FortuneCity:size=30}${execi 1800 curl 'wttr.in/[REDACTED]?m&format=%t+(%f)'}${font}
${hr 3}
${execi 5 /home/golo/.config/conky/cavalier/cavalierScript.sh}
#cavaliers gap
${voffset 225}
#mpd
${font FortuneCity:italic:size=22}${color}MPD${font}  ${hr 3}
${font FOT\-Rodin Pro DB:size=16}${color}${mpd_status}
${font FOT\-Rodin Pro DB:size=16}${color}${mpd_elapsed}  ${mpd_bar 5,283}
#for displaying placeholder when nothing playing, album art change handled by rmpc on song change
${execi 30 /home/golo/.config/conky/mpdImages/update_album_art.sh}
#album arts gap
${voffset 250}
${image /home/golo/.config/conky/mpdImages/conky_cover.jpg -p 1,645 -s 350x300 -n}
${font FOT\-Rodin Pro DB:size=16}${color}${scroll 27 5 ${mpd_title}}
${font FOT\-Rodin Pro DB:size=12}${color}${mpd_artist}
${font FOT\-Rodin Pro DB:size=12}${color}${scroll 32 5 ${mpd_album}}
${voffset 5}
#network stats, only looking for nordlynx traffic
${font FortuneCity:italic:size=22}${color}Network${font}${if_match "${execi 30 /home/golo/.config/conky/nord/nordvpn.sh}" == "on"}${image /home/golo/.config/conky/nord/NordOn.png -p 114,1036 -s 32x32}${else}${image /home/golo/.config/conky/nord/NordOff.png -p 114,1036 -s 32x32}${endif}           ${hr 3}
${font FOT\-Rodin Pro DB:size=16}${color}Down:	${downspeed nordlynx}/s
${downspeedgraph nordlynx 50,350 5A5A5A 7F7F7F}
${font FOT\-Rodin Pro DB:size=16}${color}Up:	  ${upspeed nordlynx}/s
${upspeedgraph nordlynx 50,350 5A5A5A 7F7F7F}
${voffset 5}
#memory stats
${font FortuneCity:italic:size=22}${color}RAM${font}  ${hr 3}
${font FOT\-Rodin Pro DB:size=16}${color}Usage: ${memperc}%
${membar 50,350}
${mem} / ${memmax}
${voffset 5}
#cpu stats
${font FortuneCity:italic:size=22}${color}CPU${font}  ${hr 3}
${font FOT\-Rodin Pro DB:size=16}${color}Usage: ${cpu}%
${cpubar 50,350}
]]
