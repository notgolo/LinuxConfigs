conky.config = {
    own_window                = true,
    own_window_class          = 'conky',
    own_window_type           = 'conky',
    own_window_argb_visual    = true,
    own_window_argb_value     = 0,
    draw_blended              = false,
    draw_borders              = false,
    draw_shades               = false,
    own_window_hints          = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_transparent    = true,
    update_interval           = 1,
    double_buffer             = true,
    minimum_width             = 350,
    maximum_width             = 350,
    minimum_height            = 2100,
    alignment                 = 'top_left',
    gap_x                     = 30,
    gap_y                     = 30,
    border_inner_margin       = 20,
    use_xft                   = true,
    font                      = 'FOT-Rodin Pro DB:size=13',
    xftalpha                  = 1,
    default_color             = '#7F7F7F',
    color1                    = '#5A5A5A',
    override_utf8_locale      = true,
    mpd_host                  ="127.0.0.1",
    mpd_port		      =6602,
    mpd_password              ="kainebestgirl",
